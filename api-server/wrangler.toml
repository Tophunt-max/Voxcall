name = "voxlink-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# account_id is set via CLOUDFLARE_ACCOUNT_ID env var or `wrangler login`
# Do not hardcode account credentials in source control.

# Bundle every D1 migration file as text so the worker can self-apply pending
# migrations on cold start (lib/autoMigrate.ts). This is the safety net for
# the case where `wrangler d1 migrations apply --remote` in CI failed, was
# skipped (push didn't touch api-server/), or hit a transient Cloudflare
# error — production schema then converges to match code on the very next
# request without needing a re-deploy.
rules = [
  { type = "Text", globs = ["**/*.sql"], fallthrough = true }
]

# Workers Logs — capture console.* output, exceptions, and request metadata so
# production failures (billing errors, webhook rejections, cron faults) are
# searchable in the dashboard and via `wrangler tail`.
#
# head_sampling_rate = 0.1 keeps 10% of request-level logs in production: this
# cuts log volume/cost at scale AND reduces the blast radius of any sensitive
# data that might ride in a request URL (e.g. legacy WS clients still on
# `?token=` before they migrate to the Sec-WebSocket-Protocol header). Explicit
# console.error/console.warn calls are still emitted for every request that
# hits them — sampling only thins the automatic per-request HTTP traces. Raise
# back toward 1 temporarily when actively debugging a low-traffic issue.
[observability]
enabled = true
head_sampling_rate = 0.1

[[d1_databases]]
binding = "DB"
database_name = "voxlink-db"
database_id = "e591c16e-d6c0-447d-9a94-84d10aa4a705"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "voxcall"
preview_bucket_name = "voxlink-storage-preview"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" },
  { name = "NOTIFICATION_HUB", class_name = "NotificationHub" },
  # Sharded connected-user registry — powers targeted realtime broadcasts so a
  # `data_changed` / presence push reaches only users with a live socket
  # instead of every user row (see durable-objects/PresenceRegistry.ts).
  { name = "PRESENCE_REGISTRY", class_name = "PresenceRegistry" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "CallSignaling", "NotificationHub"]

# v2 — Agora migration: the legacy Cloudflare Calls WebRTC signaling Durable
# Object (CallSignaling) was removed. It held no durable storage (only
# hibernatable WebSockets), so deleting the class is safe and drops no data.
[[migrations]]
tag = "v2"
deleted_classes = ["CallSignaling"]

# v3 — add the sharded PresenceRegistry Durable Object. SQLite-backed so its
# connected-user membership survives hibernation. Additive only; no data moves.
[[migrations]]
tag = "v3"
new_sqlite_classes = ["PresenceRegistry"]

# Stale call cleanup cron — runs every 1 minute.
# Reaps call_sessions stuck in 'pending' (>2 min) and 'active' (>30 min) so
# callers/hosts crashing mid-call don't leave coins frozen and don't leave
# the admin/host UI showing a phantom in-progress call. Previous 5-minute
# interval meant pending sessions could sit visible for up to 5min + 2min
# = ~7min before being reaped. The reaper itself is cheap (one SELECT plus
# a small batch UPDATE) so 1-minute cadence is well within Worker free-tier
# cron limits.
[triggers]
crons = ["* * * * *"]

[vars]
# Deployed worker is the production environment. Local `wrangler dev` overrides
# this to "development" via .dev.vars.
ENVIRONMENT = "production"

# Secrets (set via Cloudflare Dashboard → Workers → voxlink-api → Settings → Variables & Secrets,
# or via `wrangler secret put <NAME>`, or automatically by .github/workflows/deploy-backend.yml
# when the matching GitHub repo secret is present):
# - JWT_SECRET                (JWT signing secret)
# - FIREBASE_SERVICE_ACCOUNT  (Firebase Service Account JSON for FCM HTTP v1 API)
#
# ── Agora RTC (the media provider) ──────────────────────────────────────────
# BOTH are REQUIRED for calls to work — Agora is the only RTC transport. The
# backend mints per-call join tokens at GET /api/calls/:id/agora-token and
# advertises `rtc_provider: "agora"` in POST /api/calls/initiate + /health.
# - AGORA_APP_ID              (Agora project App ID — stored as a secret for parity)
# - AGORA_APP_CERTIFICATE     (Agora project primary certificate — SECRET, signs RTC tokens)

[dev]
port = 8787
local_protocol = "http"
ip = "0.0.0.0"
