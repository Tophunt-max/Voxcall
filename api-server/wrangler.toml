name = "voxlink-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

account_id = "b592b3b2a5455323a76de721a92699cd"

# Workers Logs — capture console.* output, exceptions, and request metadata so
# production failures (billing errors, webhook rejections, cron faults) are
# searchable in the dashboard and via `wrangler tail`. head_sampling_rate = 1
# keeps 100% of logs; lower it if volume/cost becomes a concern at scale.
[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "voxlink-db"
database_id = "e591c16e-d6c0-447d-9a94-84d10aa4a705"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "voxcall"
preview_bucket_name = "voxlink-storage-preview"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" },
  { name = "CALL_SIGNALING", class_name = "CallSignaling" },
  { name = "NOTIFICATION_HUB", class_name = "NotificationHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "CallSignaling", "NotificationHub"]

# Stale call cleanup cron — runs every 1 minute.
# Reaps call_sessions stuck in 'pending' (>2 min) and 'active' (>30 min) so
# callers/hosts crashing mid-call don't leave coins frozen and don't leave
# the admin/host UI showing a phantom in-progress call. Previous 5-minute
# interval meant pending sessions could sit visible for up to 5min + 2min
# = ~7min before being reaped. The reaper itself is cheap (one SELECT plus
# a small batch UPDATE) so 1-minute cadence is well within Worker free-tier
# cron limits.
[triggers]
crons = ["* * * * *"]

[vars]
CF_ACCOUNT_ID = "b592b3b2a5455323a76de721a92699cd"
CF_CALLS_APP_ID = "536d1e7e8d540b7ccfb238d32f734d1a"

# Secrets (set via Cloudflare Dashboard → Workers → voxlink-api → Settings → Variables & Secrets,
# or via `wrangler secret put <NAME>`, or automatically by .github/workflows/deploy-backend.yml
# when the matching GitHub repo secret is present):
# - CF_CALLS_APP_SECRET       (Cloudflare Calls App Secret)
# - JWT_SECRET                (JWT signing secret)
# - FIREBASE_SERVICE_ACCOUNT  (Firebase Service Account JSON for FCM HTTP v1 API)
# - TURN_KEY_ID               (Cloudflare Realtime TURN Key ID — for /api/calls/ice-config)
# - TURN_KEY_TOKEN            (Cloudflare Realtime TURN Key Token — for /api/calls/ice-config)

[dev]
port = 8787
local_protocol = "http"
ip = "0.0.0.0"
