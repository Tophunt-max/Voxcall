name = "voxlink-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

account_id = "b592b3b2a5455323a76de721a92699cd"

[[d1_databases]]
binding = "DB"
database_name = "voxlink-db"
database_id = "e591c16e-d6c0-447d-9a94-84d10aa4a705"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "voxcall"
preview_bucket_name = "voxlink-storage-preview"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" },
  { name = "CALL_SIGNALING", class_name = "CallSignaling" },
  { name = "NOTIFICATION_HUB", class_name = "NotificationHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "CallSignaling", "NotificationHub"]

# FIX #2: Stale call cleanup cron — runs every 5 minutes
# Reaps call_sessions stuck in 'active'/'pending' for >30 min (crash/disconnect scenario)
[triggers]
crons = ["*/5 * * * *"]

[vars]
CF_ACCOUNT_ID = "b592b3b2a5455323a76de721a92699cd"

# Secrets (set via Cloudflare Dashboard → Workers → voxlink-api → Settings → Variables & Secrets):
# - CF_CALLS_APP_ID           (Cloudflare Calls App ID)
# - CF_CALLS_APP_SECRET       (Cloudflare Calls App Secret)
# - JWT_SECRET                (JWT signing secret)
# - FIREBASE_SERVICE_ACCOUNT  (Firebase Service Account JSON for FCM HTTP v1 API)

[dev]
port = 8787
local_protocol = "http"
ip = "0.0.0.0"
