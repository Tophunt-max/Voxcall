name = "ota"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# The web console is a React app (web/) built by Vite into ./web-dist and served
# by THIS worker as static assets — one worker, one deploy. The Worker handles
# the API + Expo endpoints; everything else falls through to the SPA (see
# serveConsoleApp in src/index.ts). Build with `pnpm run build` (vite build),
# deploy with `wrangler deploy`.
[assets]
directory = "./web-dist"
binding = "ASSETS"

# Self-hosted Expo Updates (OTA) server. Serves JS/asset updates for the two
# Expo apps (voxlink = "user", voxlink-host = "host") straight out of the
# existing R2 bucket — no extra infrastructure or per-MAU billing.
#
# account_id comes from CLOUDFLARE_ACCOUNT_ID / `wrangler login`.

[observability]
enabled = true

# Reuses the SAME R2 bucket as the API worker. All OTA objects live under the
# `ota/` key prefix so they never collide with app media/uploads.
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "voxcall"
preview_bucket_name = "voxlink-storage-preview"

[vars]
# keyid advertised in the code-signing header (only used when signing is on).
CODE_SIGNING_KEY_ID = "root"

# Optional secret — set to enable manifest code signing (recommended for
# production). Generate a key/cert (see README) and:
#   wrangler secret put CODE_SIGNING_PRIVATE_KEY
# Leave unset to serve unsigned manifests (simplest; fine while the app has NO
# codeSigningCertificate configured).

# Web console (built-in UI at /console). Set this secret to unlock it:
#   wrangler secret put CONSOLE_PASSWORD
# While UNSET the console's data + management endpoints return 503 — so there
# is never an open rollback/force switch. For local dev put it in .dev.vars.

# EAS Build webhook secret. Set it to auto-publish finished EAS builds to the
# Downloads page WITHOUT GitHub Actions — works for builds triggered locally
# (`eas build`), from the expo.dev dashboard, or from CI:
#   wrangler secret put EAS_WEBHOOK_SECRET      # any long random string
# Then register one webhook per Expo app (run inside each app dir), reusing the
# SAME secret so this worker can verify both:
#   eas webhook:create --event BUILD \
#     --url "https://<this-worker-host>/console/hooks/eas?app=user" --secret "<secret>"
#   eas webhook:create --event BUILD \
#     --url "https://<this-worker-host>/console/hooks/eas?app=host" --secret "<secret>"
# While UNSET the /console/hooks/eas endpoint returns 503 (disabled).

[dev]
port = 8790
local_protocol = "http"
ip = "0.0.0.0"
