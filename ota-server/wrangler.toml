name = "voxcall-ota"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# The web console ships as real files under src/console/assets/ (shell.html,
# styles.css.txt, client.js.txt), imported as strings by src/console/page.ts and
# bundled verbatim — so the worker needs no separate frontend build/asset step.
# They use `.html`/`.txt`, which wrangler already treats as Text modules by
# default (no custom rule needed). The CSS/JS carry a `.txt` suffix because
# esbuild's built-in .css/.js loaders would otherwise process them (and can't be
# overridden), instead of handing back the file contents as a string.

# Self-hosted Expo Updates (OTA) server. Serves JS/asset updates for the two
# Expo apps (voxlink = "user", voxlink-host = "host") straight out of the
# existing R2 bucket — no extra infrastructure or per-MAU billing.
#
# account_id comes from CLOUDFLARE_ACCOUNT_ID / `wrangler login`.

[observability]
enabled = true

# Reuses the SAME R2 bucket as the API worker. All OTA objects live under the
# `ota/` key prefix so they never collide with app media/uploads.
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "voxcall"
preview_bucket_name = "voxlink-storage-preview"

[vars]
# keyid advertised in the code-signing header (only used when signing is on).
CODE_SIGNING_KEY_ID = "root"

# Optional secret — set to enable manifest code signing (recommended for
# production). Generate a key/cert (see README) and:
#   wrangler secret put CODE_SIGNING_PRIVATE_KEY
# Leave unset to serve unsigned manifests (simplest; fine while the app has NO
# codeSigningCertificate configured).

# Web console (built-in UI at /console). Set this secret to unlock it:
#   wrangler secret put CONSOLE_PASSWORD
# While UNSET the console's data + management endpoints return 503 — so there
# is never an open rollback/force switch. For local dev put it in .dev.vars.

[dev]
port = 8790
local_protocol = "http"
ip = "0.0.0.0"
