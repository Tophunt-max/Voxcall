<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VoxCall OTA Console</title>
<style>__STYLES__</style>
</head>
<body>

<div id="auth" class="authwrap hidden">
  <div class="authcard">
    <div class="brandmark"><svg viewBox="0 0 24 24" fill="#fff"><path d="M13 2 4.5 13.5H11l-1 8.5L20 9h-6.5L13 2z"/></svg></div>
    <h1>VoxCall OTA</h1>
    <p class="muted" style="margin-top:0">Self-hosted Expo Updates console. Enter the console password (the <span class="mono">CONSOLE_PASSWORD</span> secret set on this worker).</p>
    <input id="token" type="password" placeholder="Console password" autocomplete="current-password" style="width:100%" />
    <button id="loginBtn" class="primary" style="width:100%; margin-top:12px">Unlock console</button>
    <div id="authErr" class="err hidden" style="margin-top:14px"></div>
  </div>
</div>

<div id="shell" class="shell hidden">
  <aside class="side">
    <div class="brand">
      <div class="brandmark"><svg viewBox="0 0 24 24" fill="#fff"><path d="M13 2 4.5 13.5H11l-1 8.5L20 9h-6.5L13 2z"/></svg></div>
      <div class="brandtext"><b>VoxCall OTA</b><span>Update console</span></div>
    </div>
    <div class="appswitch">
      <button data-app="user" class="active">User</button>
      <button data-app="host">Host</button>
    </div>
    <div class="navlabel">Menu</div>
    <nav>
      <div class="navitem active" data-view="overview"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span> Overview</div>
      <div class="navitem" data-view="updates"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m6 10 6-6 6 6"/><path d="M4 20h16"/></svg></span> Updates</div>
      <div class="navitem" data-view="channels"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><circle cx="18" cy="9" r="2.6"/><path d="M6 8.6v6.8"/><path d="M18 11.6c0 3.4-4 3.4-7 4.4"/></svg></span> Channels</div>
      <div class="navitem" data-view="downloads"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg></span> Downloads</div>
    </nav>
    <div class="bottom">
      <div class="navitem" id="logoutBtn"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg></span> Sign out</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h2 id="viewTitle">Overview</h2>
        <div class="sub" id="viewSub"></div>
      </div>
      <div class="tools">
        <div class="liveind"><span class="livedot" id="liveDot"></span><span id="liveTxt">connecting…</span></div>
        <button id="autoBtn" class="sm">Auto</button>
        <button id="refreshBtn" class="iconbtn sm" title="Refresh now"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg></button>
      </div>
    </div>
    <div class="content">
      <div id="err" class="err hidden"></div>
      <div id="loading" class="spin"></div>
      <div id="content"></div>
    </div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="drawer" class="drawer"></div>
<div id="modalWrap" class="modalwrap hidden"><div id="modalCard" class="modalcard"></div></div>
<div id="toast" class="toast"></div>

<script>__CLIENT__</script>
</body>
</html>
