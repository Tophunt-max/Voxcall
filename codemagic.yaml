# ============================================================================
# Codemagic CI/CD — one Android workflow for build, distribute AND OTA.
# ============================================================================
# A single workflow whose MODE variable decides what runs:
#   MODE=build  → build installable APK (eas build --local, no EAS credits) and
#                 email it to testers (over-the-air install of the binary).
#   MODE=ota    → publish a JS-only CodePush OTA update (no rebuild, no store
#                 review) via @codemagic/code-push-cli.
#   MODE=both   → build a fresh binary AND push an OTA to users on that version.
#
# CodePush note: OTA only updates the JS layer. Native changes (new modules,
# permissions, RN upgrade) require MODE=build + a store release. The installed
# app must already contain the CodePush SDK for an OTA to reach it.
#
# ── One-time setup in Codemagic ─────────────────────────────────────────────
# Create ONE environment variable group named "voxcall" (Settings → Environment
# variables), all marked Secure, containing:
#   EXPO_TOKEN                       (needed for MODE build/both — eas build --local)
#   CODEPUSH_ACCESS_KEY              (needed for MODE ota/both — code-push login)
#   CODEPUSH_DEPLOYMENT_KEY_ANDROID  (embedded into the build by plugins/withCodePush)
#   GOOGLE_SERVICES_JSON_USER        (base64 of voxlink/google-services.json)
#   GOOGLE_SERVICES_JSON_HOST        (base64 of voxlink-host/google-services.json)
#     produce with:  base64 -w0 google-services.json   (Linux)  /  base64 -i google-services.json (macOS)
#   ANDROID_KEYSTORE_USER / ANDROID_KEYSTORE_HOST  (base64 of each app's release .jks)
#   ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD  (signing secrets)
#     no keystore yet? generate one, then base64 it:
#       keytool -genkeypair -v -keystore release.jks -alias voxcall -keyalg RSA -keysize 2048 -validity 10000
#     signing is LOCAL (eas.json credentialsSource: local) — no EAS-stored keystore needed.
# The group MUST exist in Codemagic or you'll see "unknown variable group(s)".
# Register the CodePush apps once: code-push app add VoxLink-Android / VoxLinkHost-Android
# Edit publishing.email.recipients below with your testers' emails.
# ============================================================================

workflows:
  android:
    name: Android — build / OTA
    instance_type: linux_x2
    max_build_duration: 90
    environment:
      groups:
        - voxcall                     # EXPO_TOKEN, CODEPUSH_ACCESS_KEY, CODEPUSH_DEPLOYMENT_KEY_ANDROID
      vars:
        MODE: "build"                # "build" | "ota" | "both"
        APPS: "user host"            # "user host" | "user" | "host"
        PROFILE: "preview"            # "preview" = APK, "production" = .aab
        DEPLOYMENT: "Staging"        # OTA target: "Staging" then promote → "Production"
        MANDATORY: "false"           # OTA: "true" to force-apply on next resume
        ROLLOUT: "100"               # OTA: percentage of users (1-100)
      node: 22
      java: 17
    cache:
      cache_paths:
        - $HOME/.pnpm-store
        - $HOME/.gradle/caches
        - $HOME/.npm
    scripts:
      - name: Enable pnpm + CLIs
        script: |
          set -e
          # Codemagic images ship pnpm → --force avoids the pnpx EEXIST clash.
          npm install -g pnpm@10.26.1 eas-cli @codemagic/code-push-cli --force
          pnpm --version && eas --version && code-push --version

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Build and/or OTA
        script: |
          set -e
          DO_BUILD=false; DO_OTA=false
          case "$MODE" in
            build) DO_BUILD=true ;;
            ota)   DO_OTA=true ;;
            both)  DO_BUILD=true; DO_OTA=true ;;
            *) echo "❌ Invalid MODE '$MODE' — use build | ota | both"; exit 1 ;;
          esac

          if [ "$DO_BUILD" = true ] && [ -z "$EXPO_TOKEN" ]; then
            echo "❌ EXPO_TOKEN missing (needed to build) — add it to the 'expo' env group."; exit 1
          fi
          if [ "$DO_OTA" = true ] && [ -z "$CODEPUSH_ACCESS_KEY" ]; then
            echo "❌ CODEPUSH_ACCESS_KEY missing (needed for OTA) — add it to the 'codepush' env group."; exit 1
          fi

          if [ "$PROFILE" = "production" ]; then EXT=aab; else EXT=apk; fi
          [ "$DO_OTA" = true ] && code-push login "https://codepush.pro" --access-key "$CODEPUSH_ACCESS_KEY"

          for APP_KEY in $APPS; do
            case "$APP_KEY" in
              user) APP_DIR=voxlink;      CP_APP=VoxLink-Android ;;
              host) APP_DIR=voxlink-host; CP_APP=VoxLinkHost-Android ;;
              *) echo "Unknown app '$APP_KEY' — skipping."; continue ;;
            esac
            VERSION=$(node -p "require('$CM_BUILD_DIR/$APP_DIR/app.json').expo.version")

            if [ "$DO_BUILD" = true ]; then
              # google-services.json is gitignored (per-app, keyed by package
              # name), so provide it from a base64 secure env var before the
              # build — otherwise the prebuild inside `eas build` fails.
              case "$APP_KEY" in
                user) GS_B64="$GOOGLE_SERVICES_JSON_USER" ;;
                host) GS_B64="$GOOGLE_SERVICES_JSON_HOST" ;;
              esac
              if [ -n "$GS_B64" ]; then
                printf '%s' "$GS_B64" | base64 -d > "$APP_DIR/google-services.json"
                echo "✓ wrote $APP_DIR/google-services.json"
              else
                echo "❌ google-services.json missing for '$APP_KEY'. Add the base64 of that app's"
                echo "   google-services.json as env var GOOGLE_SERVICES_JSON_$(echo "$APP_KEY" | tr a-z A-Z) in the 'voxcall' group."
                exit 1
              fi

              # Signing keystore via local credentials (eas.json credentialsSource
              # is "local") — no EAS-stored keystore needed. Provide the keystore
              # as base64 + passwords in the 'voxcall' group.
              case "$APP_KEY" in
                user) KS_B64="$ANDROID_KEYSTORE_USER" ;;
                host) KS_B64="$ANDROID_KEYSTORE_HOST" ;;
              esac
              if [ -z "$KS_B64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
                echo "❌ Signing keystore not configured for '$APP_KEY'. In the 'voxcall' group add:"
                echo "   ANDROID_KEYSTORE_$(echo "$APP_KEY" | tr a-z A-Z)  (base64 of the .jks), plus"
                echo "   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
                echo "   No keystore yet? Generate one:"
                echo "   keytool -genkeypair -v -keystore release.jks -alias voxcall -keyalg RSA -keysize 2048 -validity 10000"
                exit 1
              fi
              mkdir -p "$APP_DIR/credentials"
              printf '%s' "$KS_B64" | base64 -d > "$APP_DIR/credentials/release.jks"
              node -e "require('fs').writeFileSync(process.argv[1], JSON.stringify({android:{keystore:{keystorePath:'credentials/release.jks',keystorePassword:process.env.ANDROID_KEYSTORE_PASSWORD,keyAlias:process.env.ANDROID_KEY_ALIAS,keyPassword:process.env.ANDROID_KEY_PASSWORD||process.env.ANDROID_KEYSTORE_PASSWORD}}},null,2))" "$APP_DIR/credentials.json"
              echo "✓ wrote $APP_DIR/credentials.json (local signing)"

              OUT="$CM_BUILD_DIR/voxcall-$APP_KEY-android.$EXT"
              echo "▶ BUILD $APP_KEY ($APP_DIR) · profile=$PROFILE · local build (no EAS credits)"
              ( cd "$APP_DIR" && eas build --platform android --profile "$PROFILE" --local --non-interactive --output "$OUT" )
              ls -lh "$OUT"
            fi

            if [ "$DO_OTA" = true ]; then
              echo "▶ OTA $CP_APP android → $DEPLOYMENT (target $VERSION · rollout $ROLLOUT%)"
              FLAGS="-d $DEPLOYMENT --targetBinaryVersion $VERSION --rollout $ROLLOUT --description \"Codemagic OTA $(date -u +%FT%TZ)\""
              [ "$MANDATORY" = "true" ] && FLAGS="$FLAGS --mandatory"
              ( cd "$APP_DIR" && eval code-push release-react "$CP_APP" android $FLAGS )
              echo "✅ OTA released to $DEPLOYMENT. Promote with: code-push promote $CP_APP Staging Production"
            fi
          done
    artifacts:
      - voxcall-*-android.apk
      - voxcall-*-android.aab
    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true
