# ============================================================================
# Codemagic CI/CD — build + OTA (CodePush), all on Codemagic.
# ============================================================================
# Two workflows:
#   • android      — build installable APKs (eas build --local, no EAS credits)
#                    and email them to testers (over-the-air install).
#   • ota-android  — publish a JavaScript OTA update via Codemagic CodePush
#                    (no rebuild / no store review) using @codemagic/code-push-cli.
#
# CodePush note: OTA only updates the JS layer. Native changes (new modules,
# permissions, RN upgrade) still require a new `android` build + store release.
# The app must already be built WITH the CodePush SDK (see plugins/withCodePush)
# and installed on the device, otherwise an OTA release has no client to reach.
#
# ── One-time setup in Codemagic ─────────────────────────────────────────────
# Env var group "expo"     (Secure): EXPO_TOKEN  (for eas build --local keystore)
# Env var group "codepush" (Secure): CODEPUSH_ACCESS_KEY  (from codemagic.io → OTA Updates → access keys)
# Register the CodePush apps once (locally or in a build):
#   code-push app add VoxLink-Android
#   code-push app add VoxLinkHost-Android
# Put each deployment key into the build env (CODEPUSH_DEPLOYMENT_KEY_ANDROID)
# so the config plugin embeds it — see plugins/withCodePush.js.
# ============================================================================

workflows:
  # ──────────────────────────────────────────────────────────────────────────
  # BUILD — installable APK, emailed to testers (OTA install of the binary)
  # ──────────────────────────────────────────────────────────────────────────
  android:
    name: Android — build & distribute
    instance_type: linux_x2
    max_build_duration: 90
    environment:
      groups:
        - expo                        # EXPO_TOKEN
      vars:
        APPS: "user host"
        PROFILE: "preview"
      node: 22
      java: 17
    cache:
      cache_paths:
        - $HOME/.pnpm-store
        - $HOME/.gradle/caches
        - $HOME/.npm
    scripts:
      - name: Enable pnpm + EAS CLI
        script: |
          set -e
          npm install -g pnpm@10.26.1 eas-cli --force
          pnpm --version && eas --version
      - name: Install dependencies
        script: pnpm install --frozen-lockfile
      - name: Build Android
        script: |
          set -e
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ EXPO_TOKEN is not set — 'eas build --local' needs it to fetch the Android keystore."
            echo "   Fix: Codemagic → Environment variables → group 'expo' → add EXPO_TOKEN (Secure)."
            exit 1
          fi
          if [ "$PROFILE" = "production" ]; then EXT=aab; else EXT=apk; fi
          for APP_KEY in $APPS; do
            case "$APP_KEY" in
              user) APP_DIR=voxlink ;;
              host) APP_DIR=voxlink-host ;;
              *) echo "Unknown app '$APP_KEY' — skipping."; continue ;;
            esac
            OUT="$CM_BUILD_DIR/voxcall-$APP_KEY-android.$EXT"
            echo "▶ Building $APP_KEY ($APP_DIR) · profile=$PROFILE · local build (no EAS credits)"
            ( cd "$APP_DIR" && eas build --platform android --profile "$PROFILE" --local --non-interactive --output "$OUT" )
            ls -lh "$OUT"
          done
    artifacts:
      - voxcall-*-android.apk
      - voxcall-*-android.aab
    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────────────────────────────────────
  # OTA — publish a JS-only CodePush update (no rebuild, no store review)
  # ──────────────────────────────────────────────────────────────────────────
  ota-android:
    name: Android — OTA update (CodePush)
    instance_type: linux_x2
    max_build_duration: 45
    environment:
      groups:
        - codepush                    # CODEPUSH_ACCESS_KEY
      vars:
        APP_KEY: "user"              # "user" or "host"
        DEPLOYMENT: "Staging"        # "Staging" then promote → "Production"
        MANDATORY: "false"           # "true" to force-apply on next resume
        ROLLOUT: "100"               # percentage of users (1-100)
      node: 22
    cache:
      cache_paths:
        - $HOME/.pnpm-store
        - $HOME/.npm
    scripts:
      - name: Enable pnpm + CodePush CLI
        script: |
          set -e
          npm install -g pnpm@10.26.1 @codemagic/code-push-cli --force
          pnpm --version && code-push --version
      - name: Install dependencies
        script: pnpm install --frozen-lockfile
      - name: Release OTA update
        script: |
          set -e
          if [ -z "$CODEPUSH_ACCESS_KEY" ]; then
            echo "❌ CODEPUSH_ACCESS_KEY is not set — add it to the Codemagic 'codepush' env group."
            exit 1
          fi
          case "$APP_KEY" in
            user) APP_DIR=voxlink;      CP_APP=VoxLink-Android ;;
            host) APP_DIR=voxlink-host; CP_APP=VoxLinkHost-Android ;;
            *) echo "Unknown APP_KEY '$APP_KEY'"; exit 1 ;;
          esac
          VERSION=$(node -p "require('$CM_BUILD_DIR/$APP_DIR/app.json').expo.version")
          code-push login "https://codepush.pro" --access-key "$CODEPUSH_ACCESS_KEY"
          FLAGS="-d $DEPLOYMENT --targetBinaryVersion $VERSION --rollout $ROLLOUT --description \"Codemagic OTA $(date -u +%FT%TZ)\""
          [ "$MANDATORY" = "true" ] && FLAGS="$FLAGS --mandatory"
          echo "▶ Releasing OTA: $CP_APP android → $DEPLOYMENT (target $VERSION, rollout $ROLLOUT%)"
          ( cd "$APP_DIR" && eval code-push release-react "$CP_APP" android $FLAGS )
          echo "✅ OTA update released to $DEPLOYMENT. Promote with: code-push promote $CP_APP Staging Production"
