# ============================================================================
# Codemagic CI/CD — Android builds for both Expo apps.
# ============================================================================
# Builds voxlink (user) + voxlink-host (host) with `eas build --local`, which
# runs the EAS build ON Codemagic's Linux machine — it consumes NO EAS build
# credits (only Codemagic build minutes). The finished APK is exposed as a
# downloadable build artifact on the Codemagic build page.
#
# ── One-time setup in Codemagic ─────────────────────────────────────────────
# Create an environment variable GROUP named "expo" (Teams → Environment
# variables) and add (mark Secure):
#   EXPO_TOKEN   Expo access token — used by `eas build --local` to fetch the
#                Android signing keystore (expo.dev → Account → Access tokens).
#
# ── How to run ──────────────────────────────────────────────────────────────
# Start the "android" workflow from the Codemagic UI. Override at start time:
#   APPS     which apps to build — "user host" (default), "user", or "host"
#   PROFILE  eas.json profile — "preview" (installable APK, default) or
#            "production" (Play Store .aab)
#
# Download the APK/AAB from the Codemagic build page (Artifacts section) once
# the build finishes.
# ============================================================================

workflows:
  android:
    name: Android (voxlink + voxlink-host)
    instance_type: linux_x2
    max_build_duration: 90
    environment:
      groups:
        - expo
      vars:
        APPS: "user host"      # override to "user" or "host" to build just one
        PROFILE: "preview"      # "preview" = installable APK, "production" = .aab
      node: 22
      java: 17
    cache:
      cache_paths:
        - $HOME/.pnpm-store
        - $HOME/.gradle/caches
        - $HOME/.npm
    scripts:
      - name: Enable pnpm + EAS CLI
        script: |
          set -e
          # Codemagic images already ship pnpm, so a plain `npm i -g pnpm`
          # clashes on the existing /usr/local/bin/pnpx symlink (EEXIST).
          # --force overwrites it; pinning @10.26.1 matches the repo's
          # packageManager + lockfileVersion 9.0.
          npm install -g pnpm@10.26.1 eas-cli --force
          pnpm --version && eas --version

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Build Android
        script: |
          set -e
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ EXPO_TOKEN is not set — 'eas build --local' needs it to fetch the Android signing keystore."
            echo "   Fix: Codemagic → Settings → Environment variables →"
            echo "        create a group named exactly 'expo' and add EXPO_TOKEN (mark Secure)."
            echo "   Get a token at: expo.dev → Account settings → Access tokens."
            exit 1
          fi
          if [ "$PROFILE" = "production" ]; then EXT=aab; else EXT=apk; fi

          for APP_KEY in $APPS; do
            case "$APP_KEY" in
              user) APP_DIR=voxlink ;;
              host) APP_DIR=voxlink-host ;;
              *) echo "Unknown app '$APP_KEY' — skipping."; continue ;;
            esac
            OUT="$CM_BUILD_DIR/voxcall-$APP_KEY-android.$EXT"
            echo "▶ Building $APP_KEY ($APP_DIR) · profile=$PROFILE · free local build (no EAS credits)"
            ( cd "$APP_DIR" && eas build --platform android --profile "$PROFILE" --local --non-interactive --output "$OUT" )
            ls -lh "$OUT"
          done
    artifacts:
      - voxcall-*-android.apk
      - voxcall-*-android.aab
