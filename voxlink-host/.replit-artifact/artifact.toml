kind = "mobile"
previewPath = "/host/"
title = "VoxLink Host App"
version = "1.0.0"
id = "artifacts/voxlink-host"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/host/" ]
localPort = 8099

[services.development]
run = "bash -c \"until curl -sf http://localhost:8099/ >/dev/null 2>&1; do sleep 3; done; sleep infinity\""

[services.production]
build = [ "pnpm", "--filter", "@workspace/voxlink-host", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/voxlink-host", "run", "serve" ]

[services.env]
PORT = "8099"
BASE_PATH = "/host/"
