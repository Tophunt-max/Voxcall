name: Deploy Web Apps (Cloudflare Pages)

# Builds and deploys BOTH Expo web apps to Cloudflare Pages via a matrix:
#   - user app  (voxlink)      -> project "voxcall"              (voxcall.pages.dev)
#   - host app  (voxlink-host) -> project "voxlink-host-mobile"
#
# Consolidates the previous three overlapping workflows (deploy-web.yml,
# deploy-mobile.yml, deploy-host-mobile.yml) into one. The web clients get
# their Agora config from the backend at runtime (GET /api/calls/:id/agora-token),
# so NO Agora secret is baked into the web bundle — only EXPO_PUBLIC_API_URL.
#
# Required GitHub secrets / variables:
#   - secrets.CLOUDFLARE_API_TOKEN       Workers + Pages: Edit scope.
#   - vars.CF_ACCOUNT_ID                 Cloudflare account ID.
#   - vars.EXPO_PUBLIC_API_URL           (optional) API base URL override.
#   - vars.EXPO_PUBLIC_SITE_URL          (optional) public site origin (user app).
#   - vars.EXPO_PUBLIC_FIREBASE_API_KEY  (optional) web push / FCM.
#   - vars.EXPO_PUBLIC_FIREBASE_VAPID_KEY (optional) web push VAPID key.

on:
  push:
    branches:
      - main
    paths:
      - 'voxlink/**'
      - 'voxlink-host/**'
      - 'lib/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: User web (voxlink -> voxcall)
            dir: voxlink
            filter: '@workspace/voxlink'
            project: voxcall
          - label: Host web (voxlink-host -> voxlink-host-mobile)
            dir: voxlink-host
            filter: '@workspace/voxlink-host'
            project: voxlink-host-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter '${{ matrix.filter }}...'

      - name: Build Expo web (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        # `pnpm build` = expo export --platform web --output-dir static-build.
        run: pnpm build
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SITE_URL: ${{ vars.EXPO_PUBLIC_SITE_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ vars.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_VAPID_KEY: ${{ vars.EXPO_PUBLIC_FIREBASE_VAPID_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: 'connectme-80909.firebaseapp.com'
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: 'connectme-80909'
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: 'connectme-80909.firebasestorage.app'
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '128169786412'
          EXPO_PUBLIC_FIREBASE_APP_ID: '1:128169786412:web:11cf3612a7f4520f98e589'

      - name: Copy FCM service worker into build output
        run: |
          SW="${{ matrix.dir }}/public/firebase-messaging-sw.js"
          OUT="${{ matrix.dir }}/static-build/firebase-messaging-sw.js"
          if [ -f "$SW" ]; then
            cp "$SW" "$OUT"
            echo "Copied service worker -> $OUT"
          else
            echo "No firebase-messaging-sw.js in ${{ matrix.dir }}/public — skipping."
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          command: pages deploy ${{ matrix.dir }}/static-build --project-name=${{ matrix.project }} --branch=main
