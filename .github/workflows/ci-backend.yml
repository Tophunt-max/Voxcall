name: CI — Backend (api-server)

# Quality gate for the Cloudflare Worker API: typecheck, lint, tests, and a
# dry-run bundle. Runs on every push to main and on PRs touching the backend.
#
# NOTE: this job uses Node 22 (not 20 like the deploy workflows) because the
# money-path integration tests exercise the real SQL via Node's built-in
# `node:sqlite` module, which is only available on Node 22.
on:
  push:
    branches: [main]
    paths:
      - 'api-server/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'api-server/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-backend.yml'
  workflow_dispatch:

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json — specifying
        # it here too makes pnpm/action-setup@v4 fail with ERR_PNPM_BAD_PM_VERSION.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @workspace/api-server...

      - name: Typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Lint
        run: pnpm --filter @workspace/api-server run lint

      - name: Test (incl. billing + webhook money paths)
        run: pnpm --filter @workspace/api-server run test

      - name: Build (dry-run bundle)
        run: pnpm --filter @workspace/api-server run build
