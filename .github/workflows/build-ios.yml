name: Build iOS (EAS)

# On-demand iOS builds for BOTH Expo apps via EAS Build (cloud):
#   - user app  (voxlink)      -> EAS project "vixcalls"
#   - host app  (voxlink-host) -> EAS project "voxlink-host"
#
# Manual (workflow_dispatch) only. iOS builds run on EAS's macOS cloud (there is
# no free local equivalent) and REQUIRE Apple Developer credentials configured
# in EAS (`eas credentials` or an App Store Connect API key stored in EAS). This
# workflow just triggers the cloud build; signing is handled by EAS.
#   - profile "preview"    -> ad-hoc / internal distribution build
#   - profile "production" -> App Store build
#
# AGORA: react-native-agora autolinks during the EAS prebuild (CocoaPods) — no
# extra config or secret needed. The Agora join token is fetched from the
# backend at runtime. Ensure the iOS Info.plist mic/camera usage strings are
# present (they are declared in app.json).
#
# Required GitHub secrets:
#   - secrets.EXPO_TOKEN   Expo access token.
# Plus Apple credentials configured inside EAS for the target bundle id.

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        type: choice
        default: both
        options: [both, user, host]
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: build-ios-${{ github.ref }}-${{ inputs.app }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: user
            label: User app (voxlink)
            dir: voxlink
          - key: host
            label: Host app (voxlink-host)
            dir: voxlink-host

    steps:
      - name: Skip if not selected
        id: gate
        run: |
          if [ "${{ inputs.app }}" = "both" ] || [ "${{ inputs.app }}" = "${{ matrix.key }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.key }} (selected: ${{ inputs.app }})."
          fi

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup EAS
        if: steps.gate.outputs.run == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: EAS build (iOS · ${{ inputs.profile }})
        if: steps.gate.outputs.run == 'true'
        working-directory: ${{ matrix.dir }}
        # --no-wait submits to EAS cloud and returns immediately. Signing is
        # performed by EAS using the Apple credentials configured for the app.
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Summary
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "## iOS build submitted (${{ matrix.label }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: \`${{ inputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Track progress on https://expo.dev (account: voxcall)." >> "$GITHUB_STEP_SUMMARY"
          echo "- Requires Apple credentials configured in EAS." >> "$GITHUB_STEP_SUMMARY"
