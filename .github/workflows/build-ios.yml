name: Build iOS (local · free)

# On-demand iOS builds for BOTH Expo apps — built on a GitHub macOS runner with
# `eas build --local` (no EAS cloud build credits consumed).
#
# COST NOTES (read before enabling):
#   - `eas build --local` uses ZERO EAS build credits — the build runs here.
#   - iOS builds REQUIRE a macOS runner. On GitHub, macOS minutes are free for
#     public repos, but count 10x against the free-minutes budget for PRIVATE
#     repos — so a few builds/month are fine, heavy use may need paid minutes.
#   - An Apple Developer Program membership ($99/yr) plus a Distribution
#     certificate + provisioning profile are required for ANY iOS distribution,
#     regardless of build method. `eas build --local` fetches those credentials
#     from EAS (needs EXPO_TOKEN + Apple creds configured via `eas credentials`).
#
# Profiles (from eas.json):
#   - "preview"    -> ad-hoc / internal build — installable by registered devices
#   - "production" -> App Store build — for submission, NOT directly installable
#
# AUTO-PUBLISH: after the build, the .ipa is uploaded to the OTA server's
# Downloads page (POST /console/api/builds/upload) so it appears automatically.
#
# Required GitHub secrets:
#   - secrets.EXPO_TOKEN            Expo access token.
#   - secrets.OTA_SERVER_URL        Base URL of the OTA worker.
#   - secrets.OTA_CONSOLE_PASSWORD  The worker's CONSOLE_PASSWORD.
# If the OTA secrets are missing, the upload step is skipped with a warning.
#
# NOTE: uploads go through the worker (~100 MB body limit on Cloudflare Free).

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        type: choice
        default: both
        options: [both, user, host]
      profile:
        description: 'Build profile'
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: build-ios-${{ github.ref }}-${{ inputs.app }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    # iOS needs macOS (Xcode). This runner consumes 10x minutes on private repos.
    runs-on: macos-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: user
            label: User app (voxlink)
            dir: voxlink
          - key: host
            label: Host app (voxlink-host)
            dir: voxlink-host

    steps:
      - name: Skip if not selected
        id: gate
        run: |
          if [ "${{ inputs.app }}" = "both" ] || [ "${{ inputs.app }}" = "${{ matrix.key }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.key }} (selected: ${{ inputs.app }})."
          fi

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup EAS CLI
        if: steps.gate.outputs.run == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build iOS locally (${{ inputs.profile }})
        if: steps.gate.outputs.run == 'true'
        working-directory: ${{ matrix.dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/voxcall-${{ matrix.key }}-ios.ipa"
          echo "OUT_FILE=$out" >> "$GITHUB_ENV"
          echo "▶ eas build --local (iOS · $PROFILE) — runs on this macOS runner, no EAS credits."
          eas build --platform ios --profile "$PROFILE" --local --non-interactive --output "$out"
          ls -lh "$out"

      - name: Upload build to OTA Downloads
        if: steps.gate.outputs.run == 'true'
        env:
          OTA_SERVER_URL: ${{ secrets.OTA_SERVER_URL }}
          OTA_CONSOLE_PASSWORD: ${{ secrets.OTA_CONSOLE_PASSWORD }}
          APP_KEY: ${{ matrix.key }}
          APP_DIR: ${{ matrix.dir }}
          PROFILE: ${{ inputs.profile }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${OTA_SERVER_URL:-}" ] || [ -z "${OTA_CONSOLE_PASSWORD:-}" ]; then
            echo "::warning::OTA_SERVER_URL / OTA_CONSOLE_PASSWORD not set — skipping upload. Artifact left in the runner ($OUT_FILE)."
            exit 0
          fi
          [ -f "$OUT_FILE" ] || { echo "::error::Build artifact missing ($OUT_FILE)."; exit 1; }
          size=$(stat -f%z "$OUT_FILE" 2>/dev/null || stat -c%s "$OUT_FILE")
          if [ "$size" -gt 104857600 ]; then
            echo "::warning::Artifact is $((size/1048576)) MB — larger than the ~100 MB Workers upload limit; upload may fail."
          fi
          version=$(jq -r '.expo.version // ""' "$GITHUB_WORKSPACE/$APP_DIR/app.json")
          build_number=$(jq -r '(.expo.ios.buildNumber // "") | tostring' "$GITHUB_WORKSPACE/$APP_DIR/app.json")
          [ "$build_number" = "null" ] && build_number=""
          filename="voxcall-${APP_KEY}-ios-${version:-build}.ipa"
          notes=$(jq -rn --arg s "CI local build · $PROFILE · $RUN_URL" '$s|@uri')
          qs="app=${APP_KEY}&platform=ios&channel=${PROFILE}&version=${version}&buildNumber=${build_number}&notes=${notes}&filename=${filename}"
          code=$(curl -sS -o "$RUNNER_TEMP/ota-resp.json" -w '%{http_code}' -X POST \
            "${OTA_SERVER_URL%/}/console/api/builds/upload?${qs}" \
            -H "Authorization: Bearer $OTA_CONSOLE_PASSWORD" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$OUT_FILE")
          echo "OTA server response ($code):"; cat "$RUNNER_TEMP/ota-resp.json" || true
          if [ "$code" != "200" ]; then echo "::error::OTA upload failed (HTTP $code)."; exit 1; fi
          {
            echo "## iOS build published (${{ matrix.label }})"
            echo "- Profile: \`$PROFILE\`  ·  Version: \`${version:-?}\` (${build_number:-?})  ·  $((size/1048576)) MB"
            echo "- Built with \`eas build --local\` (no EAS build credits) and uploaded to the OTA Downloads page ✔"
            echo "- Reminder: only \`preview\` (ad-hoc) builds install directly; \`production\` is for App Store submission."
          } >> "$GITHUB_STEP_SUMMARY"
