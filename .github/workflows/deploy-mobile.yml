name: Deploy Mobile Web (Cloudflare Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'voxlink/**'
      - 'lib/**'
      - '.github/workflows/deploy-mobile.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Expo Web to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export Expo Web App
        working-directory: voxlink
        run: pnpm exec expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          projectName: voxlink-mobile
          directory: voxlink/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
