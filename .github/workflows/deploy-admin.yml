name: Deploy Admin Panel (Cloudflare Pages)

# Builds the Vite admin panel and deploys the static bundle to the
# `voxlink-admin` Cloudflare Pages project.
#
# Required GitHub secrets / variables:
#   - secrets.CLOUDFLARE_API_TOKEN  Workers + Pages: Edit scope.
#   - vars.CF_ACCOUNT_ID            Cloudflare account ID.

on:
  push:
    branches:
      - main
    paths:
      - 'admin-panel/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter '@workspace/admin-panel...'

      - name: Build Admin Panel
        working-directory: admin-panel
        run: pnpm build
        env:
          NODE_ENV: production
          # Static bundle serves from the Pages root URL.
          BASE_PATH: '/'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          # --branch=main makes this a PRODUCTION deployment.
          command: pages deploy admin-panel/dist --project-name=voxlink-admin --branch=main
