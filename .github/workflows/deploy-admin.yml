name: Deploy Admin Panel (Cloudflare Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'admin-panel/**'
      - 'lib/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Read pnpm version from `packageManager` in root package.json.
        # Specifying `version` here AND in package.json makes
        # pnpm/action-setup@v4 refuse to install with
        # `ERR_PNPM_BAD_PM_VERSION`. Removing the inline `with: version`
        # makes packageManager the single source of truth.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Admin Panel
        working-directory: admin-panel
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          projectName: voxlink-admin
          directory: admin-panel/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
