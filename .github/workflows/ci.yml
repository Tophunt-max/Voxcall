name: CI — Quality Gate

# Unified quality gate for the whole monorepo. Runs typecheck / lint / test /
# build for every deployable package via a matrix, on pull requests and pushes
# to main. "build" = wrangler dry-run (backend), vite build (admin), or
# `expo export --platform web` (both Expo apps).
#
# Replaces the old per-package ci-backend.yml + ci-admin.yml and adds the two
# Expo apps (voxlink user app + voxlink-host) which previously had NO CI.
#
# Node 22 everywhere: the backend money-path tests exercise real SQL through
# Node's built-in `node:sqlite`, which only exists on Node 22. Expo SDK 54 and
# the RN 0.81 toolchain also run fine on 22, so one version keeps it simple.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend (api-server)
            filter: '@workspace/api-server'
            lint: true
            test: true
            build: true
          - name: Admin Panel
            filter: '@workspace/admin-panel'
            lint: true
            test: true
            build: true
          - name: User App (voxlink)
            filter: '@workspace/voxlink'
            lint: true
            test: true
            build: true
          - name: Host App (voxlink-host)
            filter: '@workspace/voxlink-host'
            lint: true
            test: false
            build: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json. Pinning a
        # `version:` here too makes pnpm/action-setup@v4 fail with
        # ERR_PNPM_BAD_PM_VERSION.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        # `<filter>...` also installs the package's workspace dependencies
        # (shared-ui, api-client-react, etc.) needed for typecheck.
        run: pnpm install --frozen-lockfile --filter ${{ matrix.filter }}...

      - name: Typecheck
        run: pnpm --filter ${{ matrix.filter }} run typecheck

      - name: Lint
        if: ${{ matrix.lint }}
        run: pnpm --filter ${{ matrix.filter }} run lint

      - name: Test
        if: ${{ matrix.test }}
        run: pnpm --filter ${{ matrix.filter }} run test

      # Backend = wrangler dry-run bundle; admin-panel = vite build; the two
      # Expo apps = `expo export --platform web`. Catches build-time breakage
      # (bundler/asset/resolution errors) that typecheck alone misses.
      - name: Build
        if: ${{ matrix.build }}
        run: pnpm --filter ${{ matrix.filter }} run build
