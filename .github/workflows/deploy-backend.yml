name: Deploy Backend (Cloudflare Workers)

# Deploys the api-server Worker (voxlink-api), applies D1 migrations against the
# production database, and syncs runtime secrets — including the Agora RTC
# credentials that power all audio/video calls.
#
# AGORA MIGRATION NOTE: calls run exclusively on Agora RTC now. The Cloudflare
# Realtime SFU + TURN path was removed, so this workflow no longer sets the
# obsolete CF_CALLS_APP_ID / CF_CALLS_APP_SECRET / TURN_KEY_ID / TURN_KEY_TOKEN
# secrets. Instead it sets AGORA_APP_ID + AGORA_APP_CERTIFICATE, which the
# backend uses to mint per-call join tokens at GET /api/calls/:id/agora-token.
#
# Required GitHub secrets / variables (Settings -> Secrets and variables):
#   - secrets.CLOUDFLARE_API_TOKEN     Workers + D1 + Pages: Edit scope.
#   - secrets.AGORA_APP_ID             Agora project App ID (required for calls).
#   - secrets.AGORA_APP_CERTIFICATE    Agora primary certificate (signs tokens).
#   - secrets.JWT_SECRET               JWT signing secret.
#   - secrets.FIREBASE_SERVICE_ACCOUNT Firebase service-account JSON (FCM v1).
# Secrets are only pushed when present, so a partially-configured repo still
# deploys the Worker code without wiping existing secrets.

on:
  push:
    branches:
      - main
    paths:
      - 'api-server/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AGORA_APP_ID_VALUE: ${{ secrets.AGORA_APP_ID }}
      AGORA_APP_CERTIFICATE_VALUE: ${{ secrets.AGORA_APP_CERTIFICATE }}
      JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
      FIREBASE_SERVICE_ACCOUNT_VALUE: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter '@workspace/api-server...'

      - name: Apply D1 migrations (production)
        working-directory: api-server
        # --remote targets the PRODUCTION D1 database. Without it, migrations
        # run against the local dev DB and prod schema silently drifts. The
        # Worker also self-applies pending migrations on cold start (autoMigrate)
        # as a safety net if this step is skipped or hits a transient error.
        run: pnpm exec wrangler d1 migrations apply voxlink-db --remote

      - name: Deploy Worker
        working-directory: api-server
        run: pnpm exec wrangler deploy

      # ── Runtime secrets (only pushed when the GitHub secret is present) ──────
      - name: Set AGORA_APP_ID
        if: ${{ env.AGORA_APP_ID_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$AGORA_APP_ID_VALUE" | pnpm exec wrangler secret put AGORA_APP_ID

      - name: Set AGORA_APP_CERTIFICATE
        if: ${{ env.AGORA_APP_CERTIFICATE_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$AGORA_APP_CERTIFICATE_VALUE" | pnpm exec wrangler secret put AGORA_APP_CERTIFICATE

      - name: Set JWT_SECRET
        if: ${{ env.JWT_SECRET_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$JWT_SECRET_VALUE" | pnpm exec wrangler secret put JWT_SECRET

      - name: Set FIREBASE_SERVICE_ACCOUNT
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT_VALUE" | pnpm exec wrangler secret put FIREBASE_SERVICE_ACCOUNT

      - name: Verify Agora configuration
        # Post-deploy sanity check: the unauthenticated diagnostic endpoint
        # reports whether the Worker has the Agora credentials set. Non-fatal —
        # logs a warning so a missing-secret misconfig is visible in the run.
        run: |
          echo "Checking calls config status..."
          STATUS=$(curl -s -m 20 https://voxlink-api.ssunilkumarmohanta3.workers.dev/api/calls-config-status || echo '{}')
          echo "$STATUS"
          echo "$STATUS" | grep -q '"calling_ready":true' \
            && echo "::notice::Agora is configured — calling is ready." \
            || echo "::warning::Agora not fully configured. Set AGORA_APP_ID + AGORA_APP_CERTIFICATE repo secrets."
