name: Deploy Backend (Cloudflare Workers)

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/api-server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        working-directory: artifacts/api-server
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set JWT_SECRET on Worker
        working-directory: artifacts/api-server
        run: echo "${{ secrets.JWT_SECRET }}" | pnpm exec wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set CF_CALLS_APP_SECRET on Worker
        if: ${{ secrets.CF_CALLS_APP_SECRET != '' }}
        working-directory: artifacts/api-server
        run: echo "${{ secrets.CF_CALLS_APP_SECRET }}" | pnpm exec wrangler secret put CF_CALLS_APP_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
