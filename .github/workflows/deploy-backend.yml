name: Deploy Backend (Cloudflare Workers)

on:
  push:
    branches:
      - main
    paths:
      - 'api-server/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CF_CALLS_SECRET: ${{ secrets.CF_CALLS_APP_SECRET }}
      CF_CALLS_APP_ID_VALUE: ${{ secrets.CF_CALLS_APP_ID || vars.CF_CALLS_APP_ID }}
      JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
      TURN_KEY_ID_VALUE: ${{ secrets.TURN_KEY_ID }}
      TURN_KEY_TOKEN_VALUE: ${{ secrets.TURN_KEY_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Read pnpm version from `packageManager` in root package.json.
        # Specifying `version` here AND in package.json makes
        # pnpm/action-setup@v4 refuse to install with
        # `ERR_PNPM_BAD_PM_VERSION`. Removing the inline `with: version`
        # makes packageManager the single source of truth.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply D1 Migrations
        working-directory: api-server
        # FIX #8: `--remote` targets the PRODUCTION D1 database. Without it,
        # `wrangler d1 migrations apply` runs against the LOCAL dev DB and the
        # production schema silently drifts (the root cause the runtime
        # ensureUsersSchema hack was papering over).
        run: pnpm exec wrangler d1 migrations apply voxlink-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        working-directory: api-server
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set JWT_SECRET on Worker
        if: ${{ env.JWT_SECRET_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$JWT_SECRET_VALUE" | pnpm exec wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set CF_CALLS_APP_SECRET on Worker
        if: ${{ env.CF_CALLS_SECRET != '' }}
        working-directory: api-server
        run: printf '%s' "$CF_CALLS_SECRET" | pnpm exec wrangler secret put CF_CALLS_APP_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # The SFU App ID pairs with the App Secret above. Previously this was NOT
      # wired, so even with the secret set the Worker stayed unconfigured
      # ("CF Calls not configured"). Set it from secrets.CF_CALLS_APP_ID or the
      # vars.CF_CALLS_APP_ID repository variable.
      - name: Set CF_CALLS_APP_ID on Worker
        if: ${{ env.CF_CALLS_APP_ID_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$CF_CALLS_APP_ID_VALUE" | pnpm exec wrangler secret put CF_CALLS_APP_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Cloudflare Realtime TURN credentials. Optional — when present,
      # /api/calls/ice-config mints short-lived TURN credentials so clients on
      # UDP-blocked networks can still reach the SFU.
      - name: Set TURN_KEY_ID on Worker
        if: ${{ env.TURN_KEY_ID_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$TURN_KEY_ID_VALUE" | pnpm exec wrangler secret put TURN_KEY_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set TURN_KEY_TOKEN on Worker
        if: ${{ env.TURN_KEY_TOKEN_VALUE != '' }}
        working-directory: api-server
        run: printf '%s' "$TURN_KEY_TOKEN_VALUE" | pnpm exec wrangler secret put TURN_KEY_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
