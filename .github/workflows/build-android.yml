name: Build Android (local · free)

# On-demand Android builds for BOTH Expo apps — built FREE on the GitHub runner.
#   - user app  (voxlink)
#   - host app  (voxlink-host)
#
# COST: this uses `eas build --local`, which runs the SAME EAS build process on
# this GitHub runner instead of Expo's paid cloud. It consumes ZERO EAS build
# credits — only free GitHub Actions minutes (Linux runners are free for public
# repos, and count against the generous free minutes for private ones).
# EXPO_TOKEN is used ONLY to fetch the app's signing keystore, not build quota.
#
# Profiles (from eas.json):
#   - "preview"    -> installable APK (internal distribution) — best for testers
#   - "production" -> Play Store AAB (app-bundle)
#
# AGORA: react-native-agora autolinks during the prebuild — no extra config.
#
# AUTO-PUBLISH: after the local build finishes, the artifact is uploaded to the
# OTA server's Downloads page (POST /console/api/builds/upload) so it appears as
# a downloadable build automatically — no manual upload.
#
# Required GitHub secrets:
#   - secrets.EXPO_TOKEN            Expo access token (expo.dev -> Account -> Access Tokens).
#   - secrets.OTA_SERVER_URL        Base URL of the OTA worker, e.g. https://ota.<subdomain>.workers.dev
#   - secrets.OTA_CONSOLE_PASSWORD  The worker's CONSOLE_PASSWORD (bearer token for the console API).
# If OTA_SERVER_URL / OTA_CONSOLE_PASSWORD are missing the build still runs; the
# upload step is skipped with a warning (the artifact stays in the runner).
#
# NOTE: uploads go through the worker, whose request-body limit is ~100 MB
# (Cloudflare Free plan). Preview APKs usually fit; if a build is larger the
# step warns — build a slimmer APK or upload the artifact to R2 directly.

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        type: choice
        default: both
        options: [both, user, host]
      profile:
        description: 'Build profile'
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: build-android-${{ github.ref }}-${{ inputs.app }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    # Local Gradle build (+ first-run tool downloads) — give it head-room.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: user
            label: User app (voxlink)
            dir: voxlink
          - key: host
            label: Host app (voxlink-host)
            dir: voxlink-host

    steps:
      - name: Skip if not selected
        id: gate
        run: |
          if [ "${{ inputs.app }}" = "both" ] || [ "${{ inputs.app }}" = "${{ matrix.key }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.key }} (selected: ${{ inputs.app }})."
          fi

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java (JDK 17)
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup EAS CLI
        if: steps.gate.outputs.run == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Android locally (${{ inputs.profile }})
        if: steps.gate.outputs.run == 'true'
        working-directory: ${{ matrix.dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          # production -> app-bundle (.aab); everything else -> installable APK.
          if [ "$PROFILE" = "production" ]; then ext="aab"; else ext="apk"; fi
          out="$RUNNER_TEMP/voxcall-${{ matrix.key }}-android.$ext"
          echo "OUT_FILE=$out" >> "$GITHUB_ENV"
          echo "ARTIFACT_EXT=$ext" >> "$GITHUB_ENV"
          echo "▶ eas build --local (Android · $PROFILE) — free on this runner, no EAS credits."
          eas build --platform android --profile "$PROFILE" --local --non-interactive --output "$out"
          ls -lh "$out"

      - name: Upload build to OTA Downloads
        if: steps.gate.outputs.run == 'true'
        env:
          OTA_SERVER_URL: ${{ secrets.OTA_SERVER_URL }}
          # Prefer the scoped publish token; fall back to the console password.
          OTA_PUBLISH_TOKEN: ${{ secrets.OTA_PUBLISH_TOKEN }}
          OTA_CONSOLE_PASSWORD: ${{ secrets.OTA_CONSOLE_PASSWORD }}
          APP_KEY: ${{ matrix.key }}
          APP_DIR: ${{ matrix.dir }}
          PROFILE: ${{ inputs.profile }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TOKEN="${OTA_PUBLISH_TOKEN:-${OTA_CONSOLE_PASSWORD:-}}"
          if [ -z "${OTA_SERVER_URL:-}" ] || [ -z "$TOKEN" ]; then
            echo "::warning::OTA_SERVER_URL / publish token not set — skipping upload. Artifact left in the runner ($OUT_FILE)."
            exit 0
          fi
          [ -f "$OUT_FILE" ] || { echo "::error::Build artifact missing ($OUT_FILE)."; exit 1; }
          size=$(stat -c%s "$OUT_FILE" 2>/dev/null || stat -f%z "$OUT_FILE")
          if [ "$size" -gt 104857600 ]; then
            echo "::warning::Artifact is $((size/1048576)) MB — larger than the ~100 MB Workers upload limit; upload may fail."
          fi
          version=$(jq -r '.expo.version // ""' "$GITHUB_WORKSPACE/$APP_DIR/app.json")
          build_number=$(jq -r '(.expo.android.versionCode // "") | tostring' "$GITHUB_WORKSPACE/$APP_DIR/app.json")
          [ "$build_number" = "null" ] && build_number=""
          filename="voxcall-${APP_KEY}-android-${version:-build}.${ARTIFACT_EXT}"
          if [ "$ARTIFACT_EXT" = "apk" ]; then ct="application/vnd.android.package-archive"; else ct="application/octet-stream"; fi
          notes=$(jq -rn --arg s "CI local build · $PROFILE · $RUN_URL" '$s|@uri')
          qs="app=${APP_KEY}&platform=android&channel=${PROFILE}&version=${version}&buildNumber=${build_number}&notes=${notes}&filename=${filename}"
          code=$(curl -sS -o "$RUNNER_TEMP/ota-resp.json" -w '%{http_code}' -X POST \
            "${OTA_SERVER_URL%/}/console/api/builds/upload?${qs}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: $ct" \
            --data-binary @"$OUT_FILE")
          echo "OTA server response ($code):"; cat "$RUNNER_TEMP/ota-resp.json" || true
          if [ "$code" != "200" ]; then echo "::error::OTA upload failed (HTTP $code)."; exit 1; fi
          {
            echo "## Android build published (${{ matrix.label }})"
            echo "- Profile: \`$PROFILE\`  ·  Version: \`${version:-?}\` (${build_number:-?})  ·  $((size/1048576)) MB"
            echo "- Built FREE on the CI runner (no EAS build credits) and uploaded to the OTA Downloads page ✔"
          } >> "$GITHUB_STEP_SUMMARY"
