name: Build Android (EAS)

# On-demand Android builds for BOTH Expo apps via EAS Build (cloud):
#   - user app  (voxlink)      -> EAS project "vixcalls"
#   - host app  (voxlink-host) -> EAS project "voxlink-host"
#
# Manual (workflow_dispatch) only, on purpose: native builds consume EAS quota,
# so we don't fire one on every push. Pick the app(s) and profile when running.
#   - profile "preview"    -> installable APK (internal distribution)
#   - profile "production" -> Play Store AAB (app-bundle)
#
# AGORA: react-native-agora is a native module that autolinks during the EAS
# prebuild — no config plugin or extra secret is needed. Calls fetch their Agora
# join token from the backend at runtime, so nothing Agora-specific is baked in.
#
# Required GitHub secrets:
#   - secrets.EXPO_TOKEN   Expo access token (expo.dev -> Account -> Access Tokens).
# The app must already be configured on EAS (eas.json + google-services.json).

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        type: choice
        default: both
        options: [both, user, host]
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: build-android-${{ github.ref }}-${{ inputs.app }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: user
            label: User app (voxlink)
            dir: voxlink
          - key: host
            label: Host app (voxlink-host)
            dir: voxlink-host

    steps:
      - name: Skip if not selected
        id: gate
        run: |
          if [ "${{ inputs.app }}" = "both" ] || [ "${{ inputs.app }}" = "${{ matrix.key }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.key }} (selected: ${{ inputs.app }})."
          fi

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup EAS
        if: steps.gate.outputs.run == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: EAS build (Android · ${{ inputs.profile }})
        if: steps.gate.outputs.run == 'true'
        working-directory: ${{ matrix.dir }}
        # --no-wait submits to EAS cloud and returns immediately (build runs
        # ~15-25 min on Expo's servers; track it on expo.dev).
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Summary
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "## Android build submitted (${{ matrix.label }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: \`${{ inputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Track progress on https://expo.dev (account: voxcall)." >> "$GITHUB_STEP_SUMMARY"
