name: Build Android (EAS)

# On-demand Android builds for BOTH Expo apps via EAS Build (cloud):
#   - user app  (voxlink)      -> EAS project "vixcalls"
#   - host app  (voxlink-host) -> EAS project "voxlink-host"
#
# Manual (workflow_dispatch) only, on purpose: native builds consume EAS quota,
# so we don't fire one on every push. Pick the app(s) and profile when running.
#   - profile "preview"    -> installable APK (internal distribution)
#   - profile "production" -> Play Store AAB (app-bundle)
#
# AGORA: react-native-agora is a native module that autolinks during the EAS
# prebuild — no config plugin or extra secret is needed. Calls fetch their Agora
# join token from the backend at runtime, so nothing Agora-specific is baked in.
#
# AUTO-PUBLISH (Expo-style): the job WAITS for the EAS cloud build, grabs the
# artifact download URL, and registers it on the OTA server's Downloads page via
# POST /console/api/builds. Result: you trigger a build here and it shows up as
# a downloadable build in the console automatically — no manual upload.
#
# Required GitHub secrets:
#   - secrets.EXPO_TOKEN            Expo access token (expo.dev -> Account -> Access Tokens).
#   - secrets.OTA_SERVER_URL        Base URL of the OTA worker, e.g. https://ota.<subdomain>.workers.dev
#   - secrets.OTA_CONSOLE_PASSWORD  The worker's CONSOLE_PASSWORD (bearer token for the console API).
# If OTA_SERVER_URL / OTA_CONSOLE_PASSWORD are missing the build still runs; the
# registration step is skipped with a warning (backwards compatible).
# The app must already be configured on EAS (eas.json + google-services.json).

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        type: choice
        default: both
        options: [both, user, host]
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: build-android-${{ github.ref }}-${{ inputs.app }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    # We now WAIT for the EAS cloud build to finish so we can auto-register the
    # resulting APK/AAB on the OTA server. EAS builds run ~15-25 min (plus queue
    # time on shared tiers), so give the job plenty of head-room.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: user
            label: User app (voxlink)
            dir: voxlink
          - key: host
            label: Host app (voxlink-host)
            dir: voxlink-host

    steps:
      - name: Skip if not selected
        id: gate
        run: |
          if [ "${{ inputs.app }}" = "both" ] || [ "${{ inputs.app }}" = "${{ matrix.key }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.key }} (selected: ${{ inputs.app }})."
          fi

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup EAS
        if: steps.gate.outputs.run == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: EAS build (Android · ${{ inputs.profile }})
        if: steps.gate.outputs.run == 'true'
        working-directory: ${{ matrix.dir }}
        # Wait for the cloud build and emit the finished build as JSON so the
        # next step can read the artifact URL. --json implies non-interactive
        # and prints the completed build array to stdout on success.
        run: |
          set -euo pipefail
          eas build --platform android --profile "${{ inputs.profile }}" --non-interactive --wait --json > "$RUNNER_TEMP/eas-build.json"
          echo "EAS build finished. Raw output:"
          cat "$RUNNER_TEMP/eas-build.json"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Register build on OTA server
        if: steps.gate.outputs.run == 'true'
        env:
          OTA_SERVER_URL: ${{ secrets.OTA_SERVER_URL }}
          OTA_CONSOLE_PASSWORD: ${{ secrets.OTA_CONSOLE_PASSWORD }}
          APP_KEY: ${{ matrix.key }}
          PROFILE: ${{ inputs.profile }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${OTA_SERVER_URL:-}" ] || [ -z "${OTA_CONSOLE_PASSWORD:-}" ]; then
            echo "::warning::OTA_SERVER_URL / OTA_CONSOLE_PASSWORD not set — skipping auto-registration. Build is still available on expo.dev."
            exit 0
          fi

          build_json="$RUNNER_TEMP/eas-build.json"
          # eas build --json emits an array of build objects; take the first.
          url=$(jq -r 'first(.[]?) | (.artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty)' "$build_json")
          version=$(jq -r 'first(.[]?) | (.appVersion // "")' "$build_json")
          build_number=$(jq -r 'first(.[]?) | (.appBuildVersion // "")' "$build_json")
          status=$(jq -r 'first(.[]?) | (.status // "")' "$build_json")

          if [ "$status" != "FINISHED" ] && [ -n "$status" ]; then
            echo "::error::EAS build status is '$status' (expected FINISHED) — nothing to register."
            exit 1
          fi
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "::error::Could not find an artifact download URL in the EAS output."
            exit 1
          fi

          # Filename from the artifact URL path (…/application-xxxx.apk|aab), with a fallback.
          filename=$(basename "${url%%\?*}")
          case "$filename" in *.apk|*.aab) ;; *) filename="${APP_KEY}-android-${version:-build}.apk" ;; esac

          payload=$(jq -n \
            --arg app "$APP_KEY" \
            --arg channel "$PROFILE" \
            --arg platform "android" \
            --arg version "$version" \
            --arg buildNumber "$build_number" \
            --arg notes "CI build · $PROFILE · $RUN_URL" \
            --arg externalUrl "$url" \
            --arg filename "$filename" \
            '{app:$app, channel:$channel, platform:$platform, version:$version, buildNumber:$buildNumber, notes:$notes, externalUrl:$externalUrl, filename:$filename}')

          code=$(curl -sS -o "$RUNNER_TEMP/ota-resp.json" -w '%{http_code}' -X POST \
            "${OTA_SERVER_URL%/}/console/api/builds" \
            -H "Authorization: Bearer $OTA_CONSOLE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "OTA server response ($code):"
          cat "$RUNNER_TEMP/ota-resp.json" || true
          if [ "$code" != "200" ]; then
            echo "::error::OTA registration failed (HTTP $code)."
            exit 1
          fi

          {
            echo "## Android build published (${{ matrix.label }})"
            echo "- Profile: \`$PROFILE\`  ·  Version: \`${version:-?}\` (${build_number:-?})"
            echo "- Registered on the OTA Downloads page ✔"
            echo "- [Download / install link]($url)"
          } >> "$GITHUB_STEP_SUMMARY"
