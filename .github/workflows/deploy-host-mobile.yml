name: Deploy Host Mobile Web (Cloudflare Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'voxlink-host/**'
      - 'lib/**'
      - '.github/workflows/deploy-host-mobile.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Host Expo Web to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export Expo Web App (Host)
        working-directory: voxlink-host
        run: pnpm exec expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_VAPID_KEY: "BA169KXMPc3JsGE64NRFeibiuxRCPfphnVroydDaG69iL4HYuhMqA1hKx3e-b5wAWhgqcBS_mIcO8Yz428do63E"
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ vars.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: "connectme-80909.firebaseapp.com"
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: "connectme-80909"
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: "connectme-80909.firebasestorage.app"
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "128169786412"
          EXPO_PUBLIC_FIREBASE_APP_ID: "1:128169786412:web:11cf3612a7f4520f98e589"

      - name: Copy Service Worker to dist
        run: |
          cp voxlink-host/public/firebase-messaging-sw.js voxlink-host/dist/firebase-messaging-sw.js
          echo "✅ Service worker copied to dist"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          projectName: voxlink-host-mobile
          directory: voxlink-host/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
