kind = "mobile"
previewPath = "/"
title = "VoxLink - Voice & Video Connection"
version = "1.0.0"
id = "artifacts/voxlink"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "bash -c \"until curl -sf http://localhost:8080/ >/dev/null 2>&1; do sleep 3; done; sleep infinity\""

[services.production]
build = [ "pnpm", "--filter", "@workspace/voxlink", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/voxlink", "run", "serve" ]

[services.env]
PORT = "8080"
BASE_PATH = "/"
